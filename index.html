<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocab Card Classroom</title>
<style>
:root{
  --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --paper:#F5F4F0;
  --paper-dark:#E9E7DF;
  --ink:#1E2530;
  --ink-soft:#5C6472;
  --rule:#DADDD9;
  --line:#D9DCD5;
  --correct:#2F6B52;
  --correct-bg:#E4EFE8;
  --wrong:#A8402F;
  --wrong-bg:#F3E7E3;
  --hint-bg:#EFEAD9;
  --hint-ink:#6B5A2E;
  --gold:#96712E;
  --gold-bg:#F1E7D3;
  --teal:#25525A;
  --teal-dark:#183B41;
  --white:#FFFFFF;
  --shadow: 0 8px 20px rgba(20,26,33,0.10);
  --shadow-soft: 0 2px 8px rgba(20,26,33,0.06);
  --radius: 10px;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-system);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer; }
input, textarea{ font-family:inherit; }
:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }

.app-shell{ max-width:760px; margin:0 auto; padding:32px 20px 60px; }

.app-header{ margin-bottom:24px; border-bottom:1px solid var(--line); padding-bottom:18px; }
.eyebrow{ font-family:var(--font-system); font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--teal-dark); margin-bottom:10px; }
.welcome-row{ display:flex; align-items:center; gap:8px; margin-bottom:2px; }
.welcome-text{ font-size:15px; color:var(--ink-soft); }
.teacher-name{ font-weight:700; color:var(--ink); }
.welcome-subline{ font-size:13px; color:var(--ink-soft); margin-bottom:10px; }
.app-title{ font-family:var(--font-system); font-weight:700; font-size:26px; color:var(--ink); letter-spacing:-0.02em; }
.app-subtitle{ color:var(--ink-soft); font-size:14px; margin-top:4px; }

.screen{ display:flex; flex-direction:column; gap:18px; }

.link-btn{
  align-self:flex-start; background:none; border:none; color:var(--teal-dark);
  font-family:var(--font-system); font-size:13px; font-weight:600;
  padding:6px 0;
}
.link-btn:hover{ text-decoration:underline; }

.icon-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:30px; height:30px; border-radius:8px; border:none; flex:0 0 auto;
  background:var(--paper-dark); color:var(--ink-soft);
}
.icon-btn svg{ display:block; }
.icon-btn:hover{ background:var(--rule); color:var(--ink); }
.icon-btn-danger:hover{ background:var(--wrong-bg); color:var(--wrong); }

/* ---------- Home / roster ---------- */
.section-toolbar{ display:flex; align-items:center; justify-content:space-between; }
.section-title{ font-family:var(--font-system); font-size:15px; font-weight:700; color:var(--ink); display:flex; align-items:center; gap:8px; }
.count-badge{ font-family:var(--font-system); font-size:12px; font-weight:600; color:var(--ink-soft); background:var(--paper-dark); padding:2px 9px; border-radius:20px; }

.tab-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(210px,1fr)); gap:12px; }
.student-tab{
  background:var(--white); border:1px solid var(--line); border-left:3px solid var(--teal);
  border-radius:var(--radius); box-shadow:var(--shadow-soft);
  display:flex; flex-direction:column; overflow:hidden; cursor:grab;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.student-tab:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }
.student-tab-main{
  background:none; border:none; text-align:left; padding:15px 16px 10px;
  display:flex; flex-direction:column; gap:3px; width:100%;
}
.student-tab-main:hover{ background:var(--paper-dark); }
.tab-name{ font-family:var(--font-system); font-weight:600; font-size:17px; color:var(--ink); letter-spacing:-0.01em; display:flex; align-items:center; gap:6px; }
.tab-meta{ font-family:var(--font-system); font-size:12px; color:var(--ink-soft); }
.student-tab-actions{ display:flex; gap:8px; padding:8px 16px 12px; border-top:1px solid var(--paper-dark); }

.drag-handle{ display:inline-flex; color:var(--ink-soft); flex:0 0 auto; }
.dragging{ opacity:0.4; }
.drag-over{ outline:2px dashed var(--teal); outline-offset:2px; }

.add-form, .edit-form{ border-left:3px solid var(--gold); gap:10px; padding:14px 16px; }
.form-actions{ display:flex; gap:8px; }

.empty-note{ color:var(--ink-soft); font-size:14px; text-align:center; margin-top:12px; }

/* ---------- Buttons ---------- */
.btn{
  border:none; border-radius:8px; padding:11px 18px; font-weight:600; font-size:14px;
  font-family:var(--font-system); box-shadow:none;
  transition:filter .12s ease;
}
.btn:hover{ filter:brightness(1.08); }
.btn:active{ filter:brightness(0.96); }
.btn-teal{ background:var(--teal); color:var(--white); }
.btn-correct{ background:var(--correct); color:var(--white); }
.btn-wrong{ background:var(--wrong); color:var(--white); }
.btn-ghost{ background:var(--paper-dark); color:var(--ink); }
.btn-next{ background:var(--ink); color:var(--white); align-self:flex-end; }
.btn-small{ padding:7px 13px; font-size:12px; }
.btn-generate{ align-self:flex-start; padding:12px 24px; font-size:14px; }
.btn-stamp{ background:var(--teal); color:var(--white); align-self:flex-start; }
.btn-stamp:hover{ filter:brightness(1.08); }

.answer-buttons{ display:flex; gap:10px; }

/* ---------- Text inputs ---------- */
.text-input, .text-area{
  width:100%; border:1px solid var(--rule); border-radius:8px; padding:9px 11px;
  background:var(--white); color:var(--ink); font-size:14px; font-family:var(--font-system);
}
.text-area{ min-height:160px; resize:vertical; line-height:1.6; }
.lesson-name-input{ font-family:var(--font-system); font-size:17px; font-weight:600; }
.file-input{ font-size:13px; }
.hint-text{ font-size:12px; color:var(--ink-soft); margin:4px 0 0; }
.file-preview{ font-family:var(--font-system); font-size:12px; font-weight:600; color:var(--correct); margin-top:6px; }
.drive-load-btn{ margin-top:10px; }

/* ---------- Student detail ---------- */
.student-header{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; padding-bottom:16px; border-bottom:1px solid var(--line); }
.student-header-left{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.student-header-actions{ display:flex; gap:8px; }
.student-name-tag{ font-family:var(--font-system); font-size:32px; font-weight:700; color:var(--ink); letter-spacing:-0.02em; }
.student-avg{ font-family:var(--font-system); font-size:12px; color:var(--ink-soft); }
.student-edit-input{ max-width:220px; }

.session-list{ display:flex; flex-direction:column; gap:8px; }
.session-row{ background:var(--white); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; cursor:grab; transition:opacity .12s ease; }
.session-summary{
  width:100%; background:none; border:none; display:flex; align-items:center;
  justify-content:space-between; gap:10px; padding:12px 16px; text-align:left;
}
.session-summary:hover{ background:var(--paper-dark); }
.session-date{ font-family:var(--font-system); font-size:12px; color:var(--ink-soft); min-width:82px; }
.session-name{ flex:1; font-size:14px; }
.session-score{ font-family:var(--font-system); font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; }
.session-detail{ padding:0 16px 14px; display:flex; flex-wrap:wrap; gap:6px; }

.word-chip{
  font-family:var(--font-system); font-size:12px; font-weight:600; padding:4px 9px; border-radius:6px;
}
.chip-correct{ background:var(--correct-bg); color:var(--correct); }
.chip-wrong{ background:var(--wrong-bg); color:var(--wrong); }
.chip-neutral{ background:var(--paper-dark); color:var(--ink-soft); }

/* ---------- Quick review ---------- */
.review-list{ display:flex; flex-direction:column; gap:10px; }
.review-item{ background:var(--white); border:1px solid var(--line); border-left:3px solid var(--gold); border-radius:var(--radius); padding:14px 16px; }
.review-word{ font-family:var(--font-system); font-weight:700; font-size:17px; color:var(--ink); display:flex; align-items:center; gap:8px; }
.review-answer{ font-size:14px; color:var(--ink-soft); margin-top:4px; }

/* ---------- Lesson setup ---------- */
.setup-title{ font-family:var(--font-system); font-size:19px; font-weight:700; color:var(--ink); letter-spacing:-0.01em; }
.source-tabs{ display:flex; gap:4px; }
.src-tab{
  border:1px solid var(--rule); border-bottom:none; background:var(--paper-dark); color:var(--ink-soft);
  border-radius:8px 8px 0 0; padding:8px 14px; font-size:13px; font-weight:600;
  font-family:var(--font-system);
}
.src-tab.active{ background:var(--white); color:var(--teal-dark); }
.source-input-area{ background:var(--white); border:1px solid var(--rule); border-radius:0 8px 8px 8px; padding:16px; }

/* ---------- Word setup (manual fill-in) ---------- */
.draft-list{ display:flex; flex-direction:column; gap:14px; }
.draft-card{
  background:var(--white); border:1px solid var(--line); border-left:3px solid var(--gold);
  border-radius:var(--radius); padding:14px 16px; display:flex; flex-direction:column; gap:8px;
}
.draft-word-row{ display:flex; align-items:center; gap:10px; }
.draft-word{ font-family:var(--font-system); font-weight:700; font-size:18px; color:var(--ink); flex:1; }
.draft-pos-input{ max-width:130px; }
.draft-label{ font-family:var(--font-system); font-size:11px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.03em; margin-bottom:-4px; }
.draft-explanation{ min-height:70px; }

.error-banner{
  background:var(--wrong-bg); color:var(--wrong); border-left:3px solid var(--wrong);
  padding:10px 14px; border-radius:6px; font-size:13px;
}

/* ---------- Deck screen ---------- */
.deck-header{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.deck-title{ display:flex; flex-direction:column; align-items:center; text-align:center; }
.lesson-name{ font-family:var(--font-system); font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-0.01em; }
.student-tag{ font-family:var(--font-system); font-size:12px; color:var(--ink-soft); }
.score-tag{
  font-family:var(--font-system); font-size:13px; font-weight:700; color:var(--white);
  background:var(--gold); padding:6px 12px; border-radius:8px; font-variant-numeric:tabular-nums;
}

.card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(56px, 1fr)); gap:8px; }
.grid-slot{
  aspect-ratio:3/4; border-radius:8px; border:1px solid var(--rule);
  background:var(--white); color:var(--ink-soft); font-family:var(--font-system);
  font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
.grid-slot:not(:disabled):hover{ transform:translateY(-2px); box-shadow:var(--shadow-soft); border-color:var(--teal); color:var(--teal-dark); }
.grid-slot:disabled{ cursor:default; }
.grid-slot-correct{ background:var(--correct-bg); color:var(--correct); border-color:var(--correct-bg); font-size:19px; }
.grid-slot-wrong{ background:var(--wrong-bg); color:var(--wrong); border-color:var(--wrong-bg); font-size:19px; }
.grid-slot-active{ border-color:var(--teal); box-shadow:0 0 0 2px var(--teal) inset; color:var(--teal-dark); }
@keyframes gridSlotPulse{
  0%{ transform:scale(1); }
  40%{ transform:scale(1.15); background:var(--teal); border-color:var(--teal); }
  100%{ transform:scale(1); }
}
.grid-slot-picked{ animation:gridSlotPulse .16s ease-out forwards; }

.deck-hint{ text-align:center; color:var(--ink-soft); font-size:13px; font-family:var(--font-system); padding:20px 0; }

.card-scene{ perspective:1800px; display:flex; justify-content:center; }
.card{
  position:relative; width:100%; max-width:520px; min-height:320px;
  transform-style:preserve-3d;
}
@keyframes cardDrawIn{
  0%{ opacity:0; transform:rotateY(180deg) scale(0.85) translateY(8px); }
  50%{ opacity:1; transform:rotateY(95deg) scale(1.06) translateY(-4px); }
  75%{ transform:rotateY(8deg) scale(1.02) translateY(0); }
  100%{ opacity:1; transform:rotateY(0deg) scale(1) translateY(0); }
}
@keyframes cardFlipReveal{
  0%{ transform:rotateY(0deg) scale(1); }
  45%{ transform:rotateY(95deg) scale(1.06); }
  70%{ transform:rotateY(165deg) scale(1.02); }
  100%{ transform:rotateY(180deg) scale(1); }
}
.card-drawn{ animation:cardDrawIn .6s cubic-bezier(.4,.15,.2,1) both; }
.card.flipped{ animation:cardFlipReveal .65s cubic-bezier(.4,.15,.2,1) forwards; }
.card-face{
  position:absolute; inset:0; backface-visibility:hidden; border-radius:12px;
  background:var(--white); border:1px solid var(--rule); box-shadow:var(--shadow);
  padding:26px 28px; display:flex; flex-direction:column; gap:12px;
}
.card-back{ transform:rotateY(180deg); }
.card-back-blank{
  flex:1; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-system); font-size:52px; font-weight:700; color:var(--rule);
}

.card-word{ font-family:var(--font-system); font-weight:700; font-size:32px; color:var(--ink); letter-spacing:-0.02em; }
.pos-tag{
  align-self:flex-start; font-family:var(--font-system); font-size:11px; font-weight:600; color:var(--teal-dark);
  background:var(--paper-dark); padding:3px 9px; border-radius:6px;
}
.card-prompt{ font-size:16px; color:var(--ink); }
.hint-note{ background:var(--hint-bg); color:var(--hint-ink); border-radius:8px; padding:10px 12px; font-size:13px; }
.hint-label{ font-family:var(--font-system); font-weight:700; font-size:11px; margin-right:6px; }

.mark-btn{
  width:52px; height:52px; border-radius:50%; border:none; font-size:22px; font-weight:700;
  display:flex; align-items:center; justify-content:center; color:var(--white);
}
.mark-btn-correct{ background:var(--correct); }
.mark-btn-wrong{ background:var(--wrong); }
.mark-btn:hover{ filter:brightness(1.08); }
.mark-btn:active{ filter:brightness(0.95); }

.result-banner{ font-family:var(--font-system); font-size:13px; font-weight:700; }
.result-correct{ color:var(--correct); }
.result-wrong{ color:var(--wrong); }
.standard-answer{ font-size:14px; }
.zh-gloss{ display:block; font-family:var(--font-system); font-size:14px; font-weight:600; color:var(--teal-dark); margin-top:4px; }
.context-line{ font-size:13px; color:var(--ink-soft); font-style:italic; }

.explanation-title{ font-family:var(--font-system); font-size:12px; font-weight:700; color:var(--teal-dark); }
.explanation-text{ font-size:15px; line-height:1.6; }

/* ---------- Results ---------- */
.results-screen{ align-items:center; text-align:center; }
.score-card{
  border:1px solid var(--line); border-top:4px solid var(--rule); border-radius:12px; padding:24px 40px;
  display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--white); margin:8px auto;
}
.score-card.grade-outstanding{ border-top-color:var(--correct); }
.score-card.grade-great{ border-top-color:var(--teal); }
.score-card.grade-keep-practicing{ border-top-color:var(--gold); }
.score-card.grade-needs-review{ border-top-color:var(--wrong); }
.score-number{ font-family:var(--font-system); font-weight:700; font-size:46px; line-height:1; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-0.02em; }
.score-label{ font-family:var(--font-system); font-size:13px; font-weight:600; color:var(--ink-soft); margin-top:4px; }
.results-lesson{ color:var(--ink-soft); font-size:13px; }
.results-chips{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:480px; }
.results-actions{ margin-top:8px; }

/* ---------- Overlays ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(20,26,33,0.45); display:flex;
  align-items:center; justify-content:center; padding:20px; z-index:50;
}
.loading-card, .modal-card{
  background:var(--white); border-radius:12px; padding:24px 28px; box-shadow:var(--shadow);
  max-width:340px; text-align:center; display:flex; flex-direction:column; gap:14px;
  font-family:var(--font-system);
}
.spinner{
  width:30px; height:30px; border-radius:50%; border:3px solid var(--paper-dark);
  border-top-color:var(--teal); margin:0 auto; animation:spin 0.9s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.modal-actions{ display:flex; gap:10px; justify-content:center; }

@media (prefers-reduced-motion: reduce){
  .card-drawn{ animation:none !important; }
  .card.flipped{ animation:none !important; transform:rotateY(180deg) !important; }
  .grid-slot-picked{ animation:none !important; }
  *{ transition:none !important; }
}

@media (max-width: 640px){
  .app-shell{ padding:20px 16px 40px; }
  .app-title{ font-size:21px; }
  .app-header{ margin-bottom:20px; padding-bottom:14px; }
  .student-name-tag{ font-size:26px; }
  .card{ min-height:290px; }
  .card-word{ font-size:26px; }
  .card-face{ padding:20px 18px; }
  .score-card{ padding:18px 26px; }
  .score-number{ font-size:36px; }
  .source-tabs{ flex-wrap:wrap; }
  .src-tab{ flex:1 1 auto; text-align:center; padding:8px 10px; }
  .draft-word-row{ flex-wrap:wrap; }
  .draft-pos-input{ max-width:100%; }
  .icon-btn{ width:34px; height:34px; }
  .student-tab-actions{ gap:10px; }
  .modal-card, .loading-card{ max-width:90vw; }
  .tab-grid{ grid-template-columns:1fr; }
  .deck-title{ order:-1; flex-basis:100%; }
}

@media (max-width: 380px){
  .card-word{ font-size:22px; }
  .mark-btn{ width:46px; height:46px; font-size:19px; }
  .score-number{ font-size:32px; }
  .btn-generate{ width:100%; }
}
</style>
</head>
<body>
<div class="app-shell"><div id="app"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
if(typeof pdfjsLib !== 'undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
</script>
<script>
/* ============ Config ============ */
var PRAISES = [
  'Correct.',
  'That is right.',
  'Well done.',
  'Exactly right.',
  'Nicely done.',
  'Correct, good work.',
  'That is the right answer.'
];

var ICON_EDIT = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>';
var ICON_DELETE = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
var ICON_DRAG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>';

var dragState = { kind: null, index: null };

/* ============ State ============ */
var state = {
  view: 'home',
  students: [],
  currentStudentId: null,
  sessions: [],
  expandedSessionId: null,
  reviewWords: [],
  lessonName: '',
  contentSource: 'paste',
  contentText: '',
  driveLink: '',
  draftCards: [],
  deck: [],
  currentCardIndex: -1,
  currentAttempt: 0,
  stage: 'deckWaiting',
  justDrawn: false,
  score: 0,
  showAddForm: false,
  newStudentName: '',
  editingStudentId: null,
  editStudentName: '',
  deletingStudentId: null,
  loading: false,
  error: null,
  showExitConfirm: false
};

/* ============ Storage helpers ============ */
/* Uses window.storage when available (running as a Claude.ai artifact),
   otherwise falls back to localStorage (running as a normal website). */
async function storageGet(key){
  if(window.storage && typeof window.storage.get === 'function'){
    try{ var r = await window.storage.get(key); return r ? r.value : null; }
    catch(e){ return null; }
  }
  try{ return localStorage.getItem(key); } catch(e){ return null; }
}
async function storageSet(key, value){
  if(window.storage && typeof window.storage.set === 'function'){
    try{ await window.storage.set(key, value); return; } catch(e){ /* fall through */ }
  }
  try{ localStorage.setItem(key, value); } catch(e){ console.error('storageSet failed', e); }
}
async function storageDelete(key){
  if(window.storage && typeof window.storage.delete === 'function'){
    try{ await window.storage.delete(key); return; } catch(e){ /* fall through */ }
  }
  try{ localStorage.removeItem(key); } catch(e){ console.error('storageDelete failed', e); }
}

/* ============ Utilities ============ */
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function shuffle(arr){
  var a = arr.slice();
  for(var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function formatDate(ts){
  var d = new Date(ts);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function pickPraise(){ return PRAISES[Math.floor(Math.random() * PRAISES.length)]; }
function gradeLabel(score){
  if(score >= 90) return {tier:'outstanding', text:'Outstanding'};
  if(score >= 75) return {tier:'great', text:'Great work'};
  if(score >= 50) return {tier:'keep-practicing', text:'Keep practicing'};
  return {tier:'needs-review', text:'Needs more review'};
}
function chipClass(outcome){
  if(outcome === 'correct1' || outcome === 'correct2') return 'chip-correct';
  if(outcome === 'wrong') return 'chip-wrong';
  return 'chip-neutral';
}
function outcomeIcon(outcome){
  if(outcome === 'correct1' || outcome === 'correct2') return '✓';
  if(outcome === 'wrong') return '✗';
  return '';
}
function currentStudentName(){
  var s = state.students.find(function(x){ return x.id === state.currentStudentId; });
  return s ? s.name : '';
}
function getGreeting(){
  var h = new Date().getHours();
  if(h < 12) return 'Good morning';
  if(h < 18) return 'Good afternoon';
  return 'Good evening';
}
var ENCOURAGEMENTS = [
  'Here is to a smooth day of lessons.',
  'One class at a time.',
  'Everything is set up and ready when you are.',
  'A good day for steady progress.',
  'Small steps add up - keep going.',
  'Ready when you are.',
  'Today is another chance to help someone improve.',
  'Consistency is what makes the difference.',
  'Nice work showing up for your students, day after day.',
  'Nothing fancy today - just good, steady teaching.'
];
function getEncouragement(){
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  return ENCOURAGEMENTS[dayOfYear % ENCOURAGEMENTS.length];
}

/* ============ Drag-to-reorder (students & lessons) ============ */
function handleDragStart(e, kind, index){
  dragState.kind = kind;
  dragState.index = index;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(index));
  e.currentTarget.classList.add('dragging');
}
function handleDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  dragState.kind = null;
  dragState.index = null;
}
function handleDragEnter(e){ e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
async function handleDrop(e, kind, targetIndex){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var sourceIndex = dragState.index;
  if(dragState.kind !== kind || sourceIndex === null || sourceIndex === targetIndex) return;

  if(kind === 'student'){
    var movedStudent = state.students.splice(sourceIndex, 1)[0];
    state.students.splice(targetIndex, 0, movedStudent);
    await saveStudents(state.students);
  } else if(kind === 'session'){
    var movedSession = state.sessions.splice(sourceIndex, 1)[0];
    state.sessions.splice(targetIndex, 0, movedSession);
    await saveSessions(state.currentStudentId, state.sessions);
  }
  render();
}

/* ============ Render dispatch ============ */
function render(){
  var app = document.getElementById('app');
  var html = '';
  if(state.view === 'home') html = renderHome();
  else if(state.view === 'studentDetail') html = renderStudentDetail();
  else if(state.view === 'lessonReview') html = renderLessonReview();
  else if(state.view === 'newLesson') html = renderNewLesson();
  else if(state.view === 'wordSetup') html = renderWordSetup();
  else if(state.view === 'deck') html = renderDeckView();
  else if(state.view === 'results') html = renderResults();

  var overlays = '';
  if(state.loading) overlays += renderLoadingOverlay();
  if(state.showExitConfirm) overlays += renderExitModal();
  if(state.deletingStudentId) overlays += renderDeleteStudentModal();

  app.innerHTML = html + overlays;
}

function getReviewWords(){

  byDate.forEach(function(s){
    (s.details || []).forEach(function(d){
      var key = (d.word || '').toLowerCase();
      if(!key || seen[key]) return;
      seen[key] = true;
      if(d.outcome === 'wrong'){
        result.push(d);
      }
    });
  });
  return result.slice(0, 5);
}

function decodeXmlEntities(str){
  return str.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&apos;/g,"'");
}

async function extractPdfText(arrayBuffer){
  var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  var textParts = [];
  for(var i = 1; i <= pdf.numPages; i++){
    var page = await pdf.getPage(i);
    var content = await page.getTextContent();
    var pageText = content.items.map(function(item){ return item.str; }).join(' ');
    textParts.push(pageText);
  }
  return textParts.join('\n\n');
}

async function extractPptxText(arrayBuffer){
  var zip = await JSZip.loadAsync(arrayBuffer);
  var slideFiles = Object.keys(zip.files)
    .filter(function(name){ return /^ppt\/slides\/slide\d+\.xml$/.test(name); })
    .sort(function(a, b){
      var na = parseInt(a.match(/slide(\d+)\.xml/)[1], 10);
      var nb = parseInt(b.match(/slide(\d+)\.xml/)[1], 10);
      return na - nb;
    });
  var texts = [];
  for(var i = 0; i < slideFiles.length; i++){
    var xml = await zip.files[slideFiles[i]].async('string');
    var matches = xml.match(/<a:t>([^<]*)<\/a:t>/g) || [];
    var slideText = matches.map(function(m){
      return decodeXmlEntities(m.replace('<a:t>', '').replace('</a:t>', ''));
    }).join(' ');
    texts.push(slideText);
  }
  return texts.join('\n\n');
}

async function handleFileUpload(fileInput){
  var file = fileInput.files[0];
  if(!file) return;
  var name = file.name.toLowerCase();
  try{
    if(name.endsWith('.txt') || name.endsWith('.md')){
      state.contentText = await file.text();
      state.error = null;
    } else if(name.endsWith('.docx')){
      if(typeof mammoth === 'undefined'){
        state.error = 'The document parser failed to load. Please use "Paste Text" instead.';
      } else {
        var buf = await file.arrayBuffer();
        var result = await mammoth.extractRawText({ arrayBuffer: buf });
        state.contentText = result.value;
        state.error = null;
      }
    } else if(name.endsWith('.pdf')){
      if(typeof pdfjsLib === 'undefined'){
        state.error = 'The PDF parser failed to load. Please use "Paste Text" instead.';
      } else {
        var pdfBuf = await file.arrayBuffer();
        state.contentText = await extractPdfText(pdfBuf);
        state.error = null;
      }
    } else if(name.endsWith('.pptx')){
      if(typeof JSZip === 'undefined'){
        state.error = 'The presentation parser failed to load. Please use "Paste Text" instead.';
      } else {
        var pptxBuf = await file.arrayBuffer();
        state.contentText = await extractPptxText(pptxBuf);
        state.error = null;
      }
    } else if(name.endsWith('.ppt')){
      state.error = 'Old-format .ppt files are not supported. Please save as .pptx, or use "Paste Text" instead.';
    } else {
      state.error = 'Only .txt, .md, .docx, .pdf, and .pptx files are supported. For other formats, use "Paste Text" instead.';
    }
  } catch(e){
    state.error = 'File read failed: ' + (e && e.message ? e.message : 'Please check the file format.');
  }
  render();
}

function extractDriveFileId(link){
  var match = String(link || '').match(/[-\w]{25,}/);
  return match ? match[0] : null;
}

async function fetchGoogleDriveContent(link){
  var id = extractDriveFileId(link);
  if(!id) throw new Error('Could not find a file ID in that Google Drive link.');

  var isDoc = link.indexOf('/document/') !== -1;
  var isSlides = link.indexOf('/presentation/') !== -1;

  var url;
  if(isDoc){
    url = 'https://docs.google.com/document/d/' + id + '/export?format=txt';
  } else if(isSlides){
    url = 'https://docs.google.com/presentation/d/' + id + '/export/txt';
  } else {
    url = 'https://drive.google.com/uc?export=download&id=' + id;
  }

  var res = await fetch(url);
  if(!res.ok){
    throw new Error('Google Drive returned an error (status ' + res.status + '). Make sure the file is shared as "Anyone with the link can view".');
  }

  var contentType = (res.headers.get('content-type') || '').toLowerCase();
  if(contentType.indexOf('pdf') !== -1){
    if(typeof pdfjsLib === 'undefined') throw new Error('The PDF parser failed to load.');
    var pdfBuf = await res.arrayBuffer();
    return await extractPdfText(pdfBuf);
  }
  if(contentType.indexOf('wordprocessingml') !== -1){
    if(typeof mammoth === 'undefined') throw new Error('The document parser failed to load.');
    var docxBuf = await res.arrayBuffer();
    var result = await mammoth.extractRawText({ arrayBuffer: docxBuf });
    return result.value;
  }
  if(contentType.indexOf('presentationml') !== -1){
    if(typeof JSZip === 'undefined') throw new Error('The presentation parser failed to load.');
    var pptxBuf = await res.arrayBuffer();
    return await extractPptxText(pptxBuf);
  }
  return await res.text();
}

async function loadFromDrive(){
  state.error = null;
  var link = state.driveLink.trim();
  if(!link){
    state.error = 'Please paste a Google Drive link.';
    render();
    return;
  }

  state.loading = true;
  render();

  try{
    var text = await fetchGoogleDriveContent(link);
    if(!text || text.trim().length < 20){
      throw new Error('The file appears to be empty, too short, or not text-based.');
    }
    state.contentText = text;
  } catch(e){
    state.contentText = '';
    state.error = (e && e.message ? e.message : 'Could not load that file.') +
      ' Google often blocks this kind of request for security reasons - copying the text and using "Paste Text" is the reliable option.';
  } finally {
    state.loading = false;
    render();
  }
}

/* Basic sanity check for whether a string looks like a real English word,
   to filter out keyboard mashes and other clearly-not-words. This cannot
   catch everything (e.g. two real words stuck together), but removes a lot
   of obvious noise without needing any external dictionary. */
function looksLikeRealWord(word){
  if(!/[aeiouy]/i.test(word)) return false;
  if(/([a-z])\1\1/i.test(word)) return false;
  if(NOISE_WORDS[word]) return false;
  return true;
}

  zone:{pos:'n.',def:'An area with a particular characteristic.',hint:'Characteristic-having area',zh:'區域'},
};

function extractCandidateWords(text, count){
  var sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  var info = {};

  sentences.forEach(function(sentence){
    var words = sentence.match(/[A-Za-z']+/g) || [];
    words.forEach(function(w){
      var lower = w.toLowerCase();
      if(lower.length < 4 || STOPWORDS[lower]) return;
      if(!looksLikeRealWord(lower)) return;
      if(!info[lower]){
        info[lower] = { word: lower, count: 0, sentence: sentence.trim() };
      }
      info[lower].count++;
    });
  });

  var candidates = Object.keys(info).map(function(k){ return info[k]; });
  candidates.sort(function(a, b){
    var scoreA = a.word.length * 2 - Math.abs(a.count - 2);
    var scoreB = b.word.length * 2 - Math.abs(b.count - 2);
    return scoreB - scoreA;
  });
  return candidates.slice(0, count);
}

var POS_ABBREV = {
  noun:'n.', verb:'v.', adjective:'adj.', adverb:'adv.', pronoun:'pron.',
  preposition:'prep.', conjunction:'conj.', interjection:'interj.',
  exclamation:'interj.', article:'art.', determiner:'det.'
};

function buildContextHint(word, fullSentence, extraNudge){
  var pattern = new RegExp('\\b' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
  var blanked = fullSentence.replace(pattern, '_____');
  if(blanked.length > 150) blanked = blanked.slice(0, 150) + '...';
  var hint = 'Look at how it is used: "' + blanked + '"';
  if(extraNudge){
    hint += ' (related to: ' + extraNudge.toLowerCase() + ')';
  }
  return hint;
}

async function tryLiveDictionaryLookup(word){
  try{
    var res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if(!res.ok) return null;
    var data = await res.json();
    if(!Array.isArray(data) || !data[0] || !data[0].meanings || !data[0].meanings[0]) return null;
    var meaning = data[0].meanings[0];
    var def = meaning.definitions && meaning.definitions[0];
    if(!def || !def.definition) return null;
    var synonym = (def.synonyms && def.synonyms[0]) || (meaning.synonyms && meaning.synonyms[0]) || null;
    return {
      pos: POS_ABBREV[meaning.partOfSpeech] || meaning.partOfSpeech || '',
      def: def.definition,
      hint: synonym || null
    };
  } catch(e){
    console.warn('[dictionary] live lookup unavailable for "' + word + '":', e && e.message ? e.message : e);
    return null;
  }
}

async function extractWordsForLesson(){
  state.error = null;
  if(state.contentText.trim().length < 20){
    state.error = state.contentSource === 'upload' ?
      'The file content could not be read yet. Please re-upload, or use "Paste Text" instead.' :
      'The passage is too short. Please paste at least one full paragraph.';
    render();
    return;
  }

  var text = state.contentText.trim();
  var candidates = extractCandidateWords(text, 30);
  console.log('[vocab] candidate words:', candidates.map(function(c){ return c.word; }));
  if(candidates.length === 0){
    state.error = 'Could not find any usable words in this passage. Try a longer or different passage.';
    render();
    return;
  }

  candidates.sort(function(a, b){
    var inBankA = WORD_BANK[a.word] ? 1 : 0;
    var inBankB = WORD_BANK[b.word] ? 1 : 0;
    return inBankB - inBankA;
  });
  console.log('[vocab] picked words (bank matches prioritized):', candidates.slice(0, 10).map(function(c){ return c.word + (WORD_BANK[c.word] ? ' (in bank)' : ' (needs lookup)'); }));

  var top = candidates.slice(0, 10);

  state.loading = true;
  render();

  var drafts = await Promise.all(top.map(async function(info){
    var contextSentence = info.sentence.length > 160 ? info.sentence.slice(0, 160) + '...' : info.sentence;
    var entry = WORD_BANK[info.word];

    if(!entry){
      var looked = await tryLiveDictionaryLookup(info.word);
      if(looked) entry = { pos: looked.pos, def: looked.def, hint: looked.hint, zh: '' };
    }

    return {
      word: info.word,
      partOfSpeech: entry ? entry.pos : '',
      prompt: 'What does "' + info.word + '" mean?',
      standardAnswer: entry ? entry.def : '',
      zh: entry && entry.zh ? entry.zh : '',
      hint: buildContextHint(info.word, info.sentence, entry ? entry.hint : null),
      explanation: entry ? entry.def : '',
      contextSentence: contextSentence
    };
  }));

  state.draftCards = drafts;
  state.loading = false;
  state.view = 'wordSetup';
  render();
}

function backFromWordSetup(){ state.view = 'newLesson'; render(); }

function startDeckFromDrafts(){
  state.deck = shuffle(state.draftCards).map(function(c){
    return {
      word: c.word,
      partOfSpeech: (c.partOfSpeech || '').trim(),
      contextSentence: c.contextSentence || '',
      prompt: (c.prompt || '').trim() || ('What does "' + c.word + '" mean?'),
      standardAnswer: (c.standardAnswer || '').trim() || 'No definition provided',
      zh: (c.zh || '').trim(),
      hint: (c.hint || '').trim(),
      explanation: (c.explanation || '').trim() || (c.standardAnswer || '').trim() || 'No explanation provided',
      revealed: false,
      outcome: null,
      showHint: false,
      flipped: false,
      praise: null
    };
  });
  state.currentCardIndex = -1;
  state.currentAttempt = 0;
  state.score = 0;
  state.stage = 'deckWaiting';
  state.view = 'deck';
  render();
}

function renderWordSetup(){
  var student = state.students.find(function(s){ return s.id === state.currentStudentId; });
  var rows = state.draftCards.map(function(c, i){
    return '<div class="draft-card">' +
      '<div class="draft-word-row">' +
        '<span class="draft-word">' + esc(c.word) + '</span>' +
        '<input type="text" class="text-input draft-pos-input" placeholder="n. / v. / adj." value="' + esc(c.partOfSpeech) + '" oninput="state.draftCards[' + i + '].partOfSpeech=this.value" />' +
      '</div>' +
      '<label class="draft-label">Question to ask</label>' +
      '<input type="text" class="text-input" value="' + esc(c.prompt) + '" oninput="state.draftCards[' + i + '].prompt=this.value" />' +
      '<label class="draft-label">Standard answer / definition</label>' +
      '<input type="text" class="text-input" placeholder="e.g. a fruit that grows on trees" value="' + esc(c.standardAnswer) + '" oninput="state.draftCards[' + i + '].standardAnswer=this.value" />' +
      '<label class="draft-label">Chinese meaning (optional - shown as a full Chinese explanation on the card)</label>' +
      '<input type="text" class="text-input" placeholder="e.g. 蘋果" value="' + esc(c.zh || '') + '" oninput="state.draftCards[' + i + '].zh=this.value" />' +
      '<label class="draft-label">Hint (shown after first wrong try)</label>' +
      '<input type="text" class="text-input" value="' + esc(c.hint) + '" oninput="state.draftCards[' + i + '].hint=this.value" />' +
      '<label class="draft-label">Full explanation (shown after two wrong tries)</label>' +
      '<textarea class="text-area draft-explanation" placeholder="Optional - defaults to the standard answer if left blank" oninput="state.draftCards[' + i + '].explanation=this.value">' + esc(c.explanation) + '</textarea>' +
    '</div>';
  }).join('');

  return '<div class="screen word-setup-screen">' +
    '<button class="link-btn" onclick="backFromWordSetup()">← Back</button>' +
    '<div class="setup-title">Fill in the details for ' + esc(student ? student.name : '') + '</div>' +
    '<p class="app-subtitle">Words in the built-in bank are pre-filled with English and Chinese. Others may get an English definition from an online lookup, but never Chinese - fill in what is still blank.</p>' +
    '<div class="draft-list">' + rows + '</div>' +
    '<button class="btn btn-teal btn-generate" onclick="startDeckFromDrafts()">Start Lesson</button>' +
  '</div>';
}

/* ============ Deck / gameplay ============ */
function renderDeckView(){
  var doneCount = state.deck.filter(function(c){ return !!c.outcome; }).length;

  var gridHtml = '<div class="card-grid">' + state.deck.map(function(c, i){
    var cls = 'grid-slot';
    var label = String(i + 1);
    var isDisabled = false;
    if(c.outcome === 'correct1' || c.outcome === 'correct2'){
      cls += ' grid-slot-correct'; label = '✓'; isDisabled = true;
    } else if(c.outcome === 'wrong'){
      cls += ' grid-slot-wrong'; label = '✗'; isDisabled = true;
    } else if(i === state.currentCardIndex && state.stage !== 'deckWaiting'){
      cls += ' grid-slot-active'; isDisabled = true;
    }
    return '<button class="' + cls + '"' + (isDisabled ? ' disabled' : '') + ' onclick="selectCard(' + i + ', event)" aria-label="Card ' + (i + 1) + '">' + label + '</button>';
  }).join('') + '</div>';

  var focusHtml;
  if(state.stage === 'cardActive' || state.stage === 'cardResolved'){
    focusHtml = renderCardScene(state.deck[state.currentCardIndex]);
  } else if(doneCount === 0){
    focusHtml = '<p class="deck-hint">Click a card above to begin</p>';
  } else {
    focusHtml = '<p class="deck-hint">' + doneCount + ' of ' + state.deck.length + ' complete — click a card above to continue</p>';
  }

  return '<div class="screen deck-screen">' +
    '<div class="deck-header">' +
      '<button class="link-btn" onclick="confirmExitDeck()">← Back</button>' +
      '<div class="deck-title">' +
        '<span class="lesson-name">' + esc(state.lessonName) + '</span>' +
        '<span class="student-tag">' + esc(currentStudentName()) + '</span>' +
      '</div>' +
      '<div class="score-tag">Score ' + state.score + '</div>' +
    '</div>' +
    gridHtml +
    focusHtml +
  '</div>';
}

var POS_ZH = {
  'n.':'名詞', 'v.':'動詞', 'adj.':'形容詞', 'adv.':'副詞',
  'pron.':'代名詞', 'prep.':'介系詞', 'conj.':'連接詞', 'interj.':'感嘆詞',
  'art.':'冠詞', 'det.':'限定詞'
};
function buildZhExplanation(pos, zh){
  if(!zh) return '';
  var posLabel = POS_ZH[pos] || '';
  return '中文意思：' + zh + (posLabel ? '（' + posLabel + '）' : '');
}

function renderCardScene(card){
  var posTag = card.partOfSpeech ? '<span class="pos-tag">' + esc(card.partOfSpeech) + '</span>' : '';
  var allDone = state.deck.every(function(c){ return !!c.outcome; });
  var nextLabel = allDone ? 'View results →' : 'Back to cards';

  var frontBody = '<div class="card-word">' + esc(card.word) + '</div>' + posTag +
    '<div class="card-prompt">' + esc(card.prompt) + '</div>' +
    (card.showHint ? '<div class="hint-note"><span class="hint-label">Hint</span>' + esc(card.hint) + '</div>' : '') +
    (!card.outcome ?
      '<div class="answer-buttons">' +
        '<button class="mark-btn mark-btn-correct" onclick="markAnswer(true)" aria-label="Correct">✓</button>' +
        '<button class="mark-btn mark-btn-wrong" onclick="markAnswer(false)" aria-label="Incorrect">✗</button>' +
      '</div>'
      : '');

  var isWrong = card.outcome === 'wrong';
  var zhExplanation = buildZhExplanation(card.partOfSpeech, card.zh);
  var backBody = '';
  if(card.outcome){
    backBody = '<div class="card-word">' + esc(card.word) + '</div>' +
      '<div class="result-banner ' + (isWrong ? 'result-wrong' : 'result-correct') + '">' +
        (isWrong ? 'Explanation' : esc(card.praise || pickPraise())) +
      '</div>' +
      (!isWrong ?
        '<div class="standard-answer"><strong>Standard answer: </strong>' + esc(card.standardAnswer) +
        (zhExplanation ? '<span class="zh-gloss">' + esc(zhExplanation) + '</span>' : '') + '</div>'
        : '<div class="explanation-text">' + esc(card.explanation) +
        (zhExplanation ? '<span class="zh-gloss">' + esc(zhExplanation) + '</span>' : '') + '</div>'
      ) +
      (card.contextSentence ? '<div class="context-line">From the passage: "' + esc(card.contextSentence) + '"</div>' : '') +
      '<button class="btn btn-next" onclick="proceedNext()">' + nextLabel + '</button>';
  } else {
    backBody = '<div class="card-back-blank">?</div>';
  }

  var drawAnimClass = state.justDrawn ? ' card-drawn' : '';
  state.justDrawn = false;

  return '<div class="card-scene"><div class="card' + (card.flipped ? ' flipped' : '') + drawAnimClass + '">' +
    '<div class="card-face card-front">' + frontBody + '</div>' +
    '<div class="card-face card-back">' + backBody + '</div>' +
  '</div></div>';
}

function selectCard(i, event){
  var card = state.deck[i];
  if(!card || card.outcome) return;

  var proceed = function(){
    state.currentCardIndex = i;
    card.revealed = true;
    state.currentAttempt = 1;
    state.stage = 'cardActive';
    state.justDrawn = true;
    render();
  };

  var btn = event && event.currentTarget;
  if(btn){
    btn.classList.add('grid-slot-picked');
    setTimeout(proceed, 160);
  } else {
    proceed();
  }
}

function markAnswer(correct){
  var card = state.deck[state.currentCardIndex];
  if(correct){
    card.outcome = state.currentAttempt === 1 ? 'correct1' : 'correct2';
    card.praise = pickPraise();
    state.score += state.currentAttempt === 1 ? 10 : 5;
    card.flipped = true;
    state.stage = 'cardResolved';
  } else {
    if(state.currentAttempt === 1){
      card.showHint = true;
      state.currentAttempt = 2;
    } else {
      card.outcome = 'wrong';
      card.flipped = true;
      state.stage = 'cardResolved';
    }
  }
  render();
}

function proceedNext(){
  var allDone = state.deck.every(function(c){ return !!c.outcome; });
  if(allDone){
    finishSession();
  } else {
    state.stage = 'deckWaiting';
    state.currentCardIndex = -1;
    render();
  }
}

async function finishSession(){
  var details = state.deck.map(function(c){
    return {
      word: c.word,
      outcome: c.outcome,
      partOfSpeech: c.partOfSpeech,
      prompt: c.prompt,
      standardAnswer: c.standardAnswer,
      hint: c.hint,
      explanation: c.explanation,
      contextSentence: c.contextSentence
    };
  });
  var record = { id: uid(), date: Date.now(), lessonName: state.lessonName, score: state.score, details: details };
  state.sessions = [record].concat(state.sessions);
  await saveSessions(state.currentStudentId, state.sessions);
  state.view = 'results';
  render();
}

function confirmExitDeck(){ state.showExitConfirm = true; render(); }
function exitDeckConfirmed(){ state.showExitConfirm = false; state.view = 'studentDetail'; render(); }
function renderExitModal(){
  return '<div class="overlay"><div class="modal-card">' +
    '<p>This lesson is not finished yet. If you leave now, this session will not be saved. Are you sure you want to leave?</p>' +
    '<div class="modal-actions">' +
      '<button class="btn btn-ghost" onclick="state.showExitConfirm=false; render();">Continue lesson</button>' +
      '<button class="btn btn-wrong" onclick="exitDeckConfirmed()">Yes, leave</button>' +
    '</div>' +
  '</div></div>';
}
function renderLoadingOverlay(){
  return '<div class="overlay"><div class="loading-card"><div class="spinner"></div><p>AI is reading the passage and picking vocabulary...</p></div></div>';
}

/* ============ Results ============ */
function renderResults(){
  var student = state.students.find(function(s){ return s.id === state.currentStudentId; });
  var grade = gradeLabel(state.score);
  var chips = state.deck.map(function(c){
    return '<span class="word-chip ' + chipClass(c.outcome) + '">' + esc(c.word) + ' ' + outcomeIcon(c.outcome) + '</span>';
  }).join('');

  return '<div class="screen results-screen">' +
    '<div class="score-card grade-' + grade.tier + '">' +
      '<div class="score-number">' + state.score + '</div>' +
      '<div class="score-label">' + grade.text + '</div>' +
    '</div>' +
    '<div class="results-lesson">' + esc(state.lessonName) + ' · ' + esc(student ? student.name : '') + '</div>' +
    '<div class="results-chips">' + chips + '</div>' +
    '<div class="results-actions">' +
      '<button class="btn btn-teal" onclick="backToStudentFromResults()">Back to ' + esc(student ? student.name : '') + ' records</button>' +
    '</div>' +
  '</div>';
}
function backToStudentFromResults(){ state.view = 'studentDetail'; render(); }

/* ============ Init ============ */
async function init(){
  state.students = await loadStudents();
  render();
}
init();
</script>
